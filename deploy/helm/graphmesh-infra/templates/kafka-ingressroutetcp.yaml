{{- if and .Values.kafka.enabled ((.Values.kafka).ingressRouteTCP).enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: {{ .Release.Name }}-kafka-tcp
  labels:
    app.kubernetes.io/name: graphmesh-infra
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: kafka
  {{- with ((.Values.kafka).ingressRouteTCP).annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  entryPoints:
    - {{ ((.Values.kafka).ingressRouteTCP).entryPoint | default "kafka" }}
  routes:
    - match: HostSNI(`*`)
      services:
        - name: {{ .Release.Name }}-kafka
          port: {{ .Values.kafka.service.ports.client | default 9092 }}
{{- end }}
