# DataStax Java Driver config (Typesafe HOCON).
# Wird zusaetzlich zur Spring-Property `spring.cassandra.protocol-version: V5`
# gesetzt, damit der Driver in allen Code-Pfaden (inkl. Spring Boot 4 Autoconfig)
# das OSS-Protokoll V5 nutzt und nicht versehentlich auf DSE_V2 zurueckfaellt.
datastax-java-driver {
  advanced.protocol {
    version = V5
  }
}
