spring:
  application:
    name: GraphMesh

graphmesh:
  messaging:
    kafka:
      enabled: true
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      group-id-prefix: graphmesh
      auto-create-topics: true
      default-partitions: 3
      default-replication-factor: 1
      graceful-shutdown:
        enabled: true
        drain-timeout-ms: 5000
        await-termination-ms: 10000
