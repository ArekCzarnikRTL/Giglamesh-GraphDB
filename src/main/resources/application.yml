logging:
  file:
    name: logs/graphmesh.log
  level:
    com.agentwork.graphmesh: DEBUG
    ai.koog: DEBUG

spring:
  application:
    name: GraphMesh
  graphql:
    graphiql:
      enabled: true
    schema:
      locations: classpath:graphql/
  ai:
    mcp:
      server:
        name: graphmesh
        version: 1.0.0
        protocol: SSE
  autoconfigure:
    exclude:
      - org.springframework.ai.vectorstore.qdrant.autoconfigure.QdrantVectorStoreAutoConfiguration
      # Sowohl MultiLLM- als auch Ollama-AutoConfig registrieren einen PromptExecutor-Bean.
      # Ollama liefert zusaetzlich den LLMEmbeddingProvider, deshalb behalten wir Ollama
      # und schliessen den Multi-LLM-Executor aus.
      - ai.koog.spring.prompt.executor.MultiLLMAutoConfiguration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
    consumer:
      group-id: graphmesh
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
    properties:
      schema.registry.url: ${SCHEMA_REGISTRY_URL:http://localhost:8081}
      specific.avro.reader: false
  cassandra:
    contact-points: ${CASSANDRA_CONTACT_POINTS:localhost}
    port: ${CASSANDRA_PORT:9042}
    local-datacenter: datacenter1
    schema-action: none

ai:
  koog:
    openai:
      enabled: ${OPENAI_ENABLED:false}
      api-key: ${OPENAI_API_KEY:}
    anthropic:
      enabled: ${ANTHROPIC_ENABLED:false}
      api-key: ${ANTHROPIC_API_KEY:}
    ollama:
      enabled: true
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}

koog:
  spring:
    ai:
      embedding:
        enabled: true

graphmesh:
  cassandra:
    keyspace: graphmesh
  storage:
    blob:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      region: us-east-1
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
      path-style-access: true
      default-bucket: graphmesh
      auto-create-buckets: true
    vector:
      host: ${QDRANT_HOST:localhost}
      grpc-port: ${QDRANT_GRPC_PORT:6334}
      use-tls: false
  chunker:
    chunk-size: 2000
    overlap-size: 200
  extraction:
    model: ${LLM_EXTRACTION_MODEL:llama3.2}
  embedding:
    model: ${EMBEDDING_MODEL:nomic-embed-text}
